
<style>
*{box-sizing:border-box;margin:0;padding:0}
.db{padding:20px 0 32px;font-family:var(--font-sans)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.sector-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pill{font-size:11px;font-weight:500;padding:5px 11px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-primary);cursor:pointer;transition:all .15s}
.pill:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.pill.active{background:#185FA5;border-color:#185FA5;color:#fff}
.agg-tabs{display:flex;gap:4px}
.tab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:transparent;cursor:pointer;transition:all .15s}
.tab:hover{background:var(--color-background-secondary)}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--color-background-secondary);border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px;letter-spacing:.3px}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.chart-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:20px}
.panel-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.panel-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.panel-sub{font-size:11px;color:var(--color-text-secondary)}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:20px 0}
</style>

function render() {
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.sector===curSector));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.agg===curAgg));

  const key = `${curSector}||${curAgg}`;
  const d = RAW[key];
  if (!d) return;

  const allVals = Object.values(d.data).flat().filter(v=>v!==null);
  const maxV = allVals.length ? Math.round(Math.max(...allVals)) : 0;
  const minV = allVals.length ? Math.round(Math.min(...allVals)) : 0;
  const avgV = allVals.length ? Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length) : 0;

  let maxEm='', minEm='';
  d.emetteurs.forEach(em => {
    const vals = d.data[em].filter(v=>v!==null);
    if(vals.length){
      if(Math.round(Math.max(...vals))===maxV) maxEm=em;
      if(Math.round(Math.min(...vals))===minV) minEm=em;
    }
  });

  document.getElementById('s-max').textContent = maxV + ' bps';
  document.getElementById('s-max-em').textContent = maxEm;
  document.getElementById('s-avg').textContent = avgV + ' bps';
  document.getElementById('s-min').textContent = (minV<0?'':'')+minV + ' bps';
  document.getElementById('s-min-em').textContent = minEm;

  document.getElementById('panel-title').textContent = curSector;
  document.getElementById('panel-sub').textContent = curAgg.toLowerCase() + ' des spreads · ' + d.emetteurs.length + ' émetteur' + (d.emetteurs.length>1?'s':'');

  const legEl = document.getElementById('legend');
  legEl.innerHTML = '';
  d.emetteurs.forEach((em,i) => {
    const s = document.createElement('span');
    s.className = 'leg';
    s.innerHTML = `<span class="leg-sq" style="background:${COLORS[i%COLORS.length]}"></span>${em}`;
    legEl.appendChild(s);
  });

  const nMats = d.maturites.length;
  const nEm = d.emetteurs.length;
  const h = Math.max(200, nMats * Math.max(32, nEm*14) + 80);
  document.getElementById('chart-wrap').style.height = h + 'px';

  const datasets = d.emetteurs.map((em,i) => ({
    label: em,
    data: d.data[em].map(v=>v===null?null:Math.round(v*10)/10),
    backgroundColor: COLORS[i%COLORS.length]+'CC',
    borderColor: COLORS[i%COLORS.length],
    borderWidth: 1,
    borderRadius: 4,
  }));

  const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const gc = isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.05)';
  const tc = isDark?'#999':'#888';
  const zc = isDark?'rgba(255,255,255,.2)':'rgba(0,0,0,.15)';

  if(chart){ chart.destroy(); }
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: { labels: d.maturites, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ctx.raw!==null ? `${ctx.dataset.label}: ${ctx.raw} bps` : null }
        }
      },
      scales: {
        x: {
          ticks: { color: tc, font:{size:11}, autoSkip:false },
          grid: { color: gc },
          border: { color: zc }
        },
        y: {
          ticks: { color: tc, font:{size:11}, callback: v => v+' bps' },
          grid: { color: gc },
          border: { color: zc }
        }
      },
      layout: { padding: { top: 4, right: 4 } }
    }
  });
}

render();
</script>
